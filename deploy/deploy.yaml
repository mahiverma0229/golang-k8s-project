apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-response-app          # AI Incident Response Platform
  labels:
    app: incident-response-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: incident-response-app
  template:
    metadata:
      labels:
        app: incident-response-app
    spec:
      containers:
      - name: incident-response-app
        image: docker.io/saiyam911/devops-project:sha-4b4583a
        imagePullPolicy: Always
        env:
        # ── Database credentials (from Kubernetes Secret) ──────────────────
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        - name: DB_HOST
          value: my-postgresql-rw.default.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: incidents_database        # stores incident history
        - name: SSL
          value: disable
        # ── OpenAI API key (from Kubernetes Secret) ────────────────────────
        # Create the secret with:
        #   kubectl create secret generic openai-credentials \
        #     --from-literal=api-key=<YOUR_KEY>
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-credentials
              key: api-key
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            memory: "350Mi"
            cpu: "250m"
          limits:
            memory: "500Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: incident-response-service      # ClusterIP service for the app
  labels:
    app: incident-response-app
spec:
  selector:
    app: incident-response-app
  ports:
    - protocol: TCP
      name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: app-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: nginx
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    hostname: "app.kubesimplify.com"
  - name: https
    hostname: "app.kubesimplify.com"
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: app-kubesimplify-com-tls
        kind: Secret
        group: ""
  - name: argo-http
    port: 80
    protocol: HTTP
    hostname: "argo.kubesimplify.com"
  - name: argo-https
    hostname: "argo.kubesimplify.com"
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Terminate
      certificateRefs:
      - name: argo-kubesimplify-com-tls
        kind: Secret
        group: ""

---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: go-app-route
spec:
  parentRefs:
  - name: app-gateway
    namespace: default
  hostnames:
  - "app.kubesimplify.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: incident-response-service  # route all traffic to the Go service
      port: 80
